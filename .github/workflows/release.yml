name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        run: make dmg VERSION=${{ steps.version.outputs.version }}

      - name: Compute SHA256
        id: sha256
        run: |
          DMG=".build/MarkSee-${{ steps.version.outputs.version }}.dmg"
          echo "sha256=$(shasum -a 256 "$DMG" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/MarkSee-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true

      - name: Update cask formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha256.outputs.sha256 }}
        run: |
          cat > Casks/marksee.rb << EOF
          cask "marksee" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/hongqn/marksee/releases/download/v#{version}/MarkSee-#{version}.dmg"
            name "MarkSee"
            desc "Lightweight macOS Markdown viewer"
            homepage "https://github.com/hongqn/marksee"

            app "MarkSee.app"
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/marksee.rb
          git commit -m "Update cask to ${VERSION}"
          git push origin HEAD:main
